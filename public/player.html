<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heróis Improváveis — Jogador</title>
<link rel="stylesheet" href="/css/shared.css">
<style>
body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* HEADER */
#header {
  background: var(--panel); border-bottom: 1px solid var(--border);
  padding: 6px 14px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
#header h1 { font-family: var(--font-d); font-size: .75rem; letter-spacing: 3px; color: var(--accent); }
.header-right { display: flex; align-items: center; gap: 8px; }
.online-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--hp); }
.user-name { font-family: var(--font-m); font-size: .68rem; color: var(--muted); }

/* MAIN */
#main { flex: 1; display: flex; overflow: hidden; }

/* HUD */
#hud {
  width: 190px; flex-shrink: 0; background: var(--panel);
  border-right: 1px solid var(--border); overflow-y: auto;
  display: flex; flex-direction: column; gap: 0;
}
.hud-sec { font-family: var(--font-d); font-size: .48rem; letter-spacing: 2px; color: var(--muted); padding: 8px 8px 4px; text-transform: uppercase; }

.hud-char {
  margin: 0 6px 6px; background: var(--card); border: 1px solid var(--border2);
  padding: 8px; cursor: default;
}
.hud-char.me { border-color: var(--accent); }
.hud-char-header { display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
.hud-char-emoji { font-size: .9rem; }
.hud-char-name { font-family: var(--font-d); font-size: .65rem; letter-spacing: 1px; color: var(--accent); flex: 1; }
.me-tag { font-family: var(--font-d); font-size: .44rem; color: var(--accent); border: 1px solid var(--accent); padding: 1px 3px; opacity: .7; }
.hud-char-sub { font-size: .54rem; color: var(--muted); margin-bottom: 5px; }
.hud-bar { margin-bottom: 3px; }
.hud-bar-top { display: flex; justify-content: space-between; font-family: var(--font-d); font-size: .5rem; color: var(--muted); margin-bottom: 2px; }
.hud-bar-top b { color: var(--text); font-weight: 400; }
.hud-track { height: 4px; background: var(--border); overflow: hidden; }
.hud-fill { height: 100%; transition: width .3s; }
.hud-fill.hp { background: var(--hp); }
.hud-fill.wp { background: var(--wp); }
.hud-attrs { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 5px; }
.hud-attr { font-family: var(--font-m); font-size: .55rem; padding: 1px 4px; border: 1px solid var(--border2); color: var(--muted); }
.hud-attr b { color: var(--text); }

/* VIT/VON EDIT (own char) */
.vit-edit { display: flex; gap: 4px; align-items: center; margin-top: 4px; }
.vit-inp {
  width: 36px; background: transparent; border: none; border-bottom: 1px solid var(--border2);
  outline: none; font-family: var(--font-m); font-size: .75rem; text-align: center; color: var(--hp);
}
.von-inp { color: var(--wp); }
.vit-sep { font-size: .6rem; color: var(--muted); }
.vit-max { font-family: var(--font-m); font-size: .6rem; color: var(--muted); }

/* Online users list */
#online-list { padding: 6px 8px; border-top: 1px solid var(--border); margin-top: auto; }
.online-user { font-family: var(--font-m); font-size: .58rem; color: var(--muted); padding: 2px 0; display: flex; align-items: center; gap: 5px; }
.online-user .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--hp); flex-shrink: 0; }
.online-user.master .dot { background: var(--accent); }

/* NARRATIVE CENTER */
#narrative { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#log { flex: 1; overflow-y: auto; padding: 14px 18px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }

/* Messages */
.msg { line-height: 1.75; }
.msg-narrate { font-size: .88rem; color: var(--text); }
.msg-narrate p { margin-bottom: 5px; }
.msg-action { font-family: var(--font-m); font-size: .78rem; color: var(--accent2); border-left: 2px solid var(--accent2); padding-left: 10px; }
.msg-action .act-author { font-size: .6rem; color: var(--muted); margin-bottom: 2px; }
.msg-roll {
  background: rgba(200,240,58,.04); border: 1px solid var(--border2);
  padding: 8px 12px; font-family: var(--font-m); font-size: .75rem;
}
.msg-roll .roll-author { font-size: .58rem; color: var(--muted); margin-bottom: 3px; }
.msg-roll .roll-dice { color: var(--accent); font-size: .9rem; }
.msg-roll .roll-total { color: var(--text); font-size: 1rem; font-family: var(--font-d); }
.msg-roll.critical { border-color: var(--accent); background: rgba(200,240,58,.08); }
.msg-roll.fumble { border-color: var(--accent3); background: rgba(255,95,126,.08); }
.msg-roll .roll-tag { font-size: .6rem; letter-spacing: 1px; padding: 1px 5px; border: 1px solid; margin-left: 6px; font-family: var(--font-d); }
.msg-roll.critical .roll-tag { color: var(--accent); border-color: var(--accent); }
.msg-roll.fumble .roll-tag { color: var(--accent3); border-color: var(--accent3); }
.msg-system { font-family: var(--font-m); font-size: .68rem; color: var(--muted); border-left: 2px solid var(--border2); padding-left: 8px; }

/* INPUT AREA */
#input-area {
  border-top: 1px solid var(--border); background: var(--panel);
  padding: 8px 14px; display: flex; flex-direction: column; gap: 6px; flex-shrink: 0;
}
.input-row { display: flex; gap: 8px; align-items: flex-end; }
#action-input {
  flex: 1; background: transparent; border: none; border-bottom: 1px solid var(--border2);
  outline: none; color: var(--accent2); font-family: var(--font-m); font-size: .85rem;
  caret-color: var(--accent); resize: none; min-height: 24px; max-height: 100px;
  overflow-y: auto; line-height: 1.5; padding: 2px 0;
}
#action-input::placeholder { color: var(--border2); }

/* DICE ROW */
.dice-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.dice-label { font-family: var(--font-d); font-size: .5rem; letter-spacing: 1px; color: var(--muted); }
.attr-roll-btn {
  font-family: var(--font-d); font-size: .55rem; letter-spacing: 1px;
  padding: 4px 8px; border: 1px solid var(--border2); background: transparent;
  color: var(--muted); cursor: pointer; transition: .2s;
}
.attr-roll-btn:hover { border-color: var(--accent); color: var(--accent); }
.free-roll-btn {
  font-family: var(--font-d); font-size: .55rem; letter-spacing: 1px;
  padding: 4px 8px; border: 1px solid var(--border2); background: transparent;
  color: var(--accent2); cursor: pointer; transition: .2s;
}
.free-roll-btn:hover { background: var(--accent2); color: #fff; }

/* CHAT SIDEBAR */
#chat-sidebar {
  width: 220px; flex-shrink: 0; background: var(--panel);
  border-left: 1px solid var(--border); display: flex; flex-direction: column;
}
#chat-header { font-family: var(--font-d); font-size: .55rem; letter-spacing: 2px; color: var(--muted); padding: 8px 10px; border-bottom: 1px solid var(--border); text-transform: uppercase; }
#chat-log { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
.chat-msg { font-size: .72rem; line-height: 1.5; }
.chat-msg .chat-author { font-family: var(--font-d); font-size: .5rem; color: var(--accent2); margin-bottom: 1px; }
.chat-msg .chat-author.master { color: var(--accent); }
.chat-msg .chat-text { color: var(--text); }
#chat-input-row { display: flex; gap: 6px; padding: 8px; border-top: 1px solid var(--border); }
#chat-inp {
  flex: 1; background: transparent; border: none; border-bottom: 1px solid var(--border2);
  outline: none; font-size: .75rem; color: var(--text); caret-color: var(--accent);
}
#chat-inp::placeholder { color: var(--border2); }
#chat-send { font-family: var(--font-d); font-size: .5rem; letter-spacing: 1px; padding: 4px 8px; border: 1px solid var(--accent2); background: transparent; color: var(--accent2); cursor: pointer; }
#chat-send:hover { background: var(--accent2); color: #fff; }

/* Sheet upload modal */
#sheet-modal .modal-box { gap: 12px; }
</style>
</head>
<body>

<div id="header">
  <h1>⚡ Heróis Improváveis</h1>
  <div class="header-right">
    <span class="online-dot"></span>
    <span class="user-name" id="user-label">—</span>
    <a href="/fastplay_4c.html" target="_blank" class="btn btn-muted sm">📖 Manual</a>
    <a href="/ficha_herois.html" target="_blank" class="btn btn-muted sm">📄 Ficha</a>
    <button class="btn btn-muted sm" onclick="openSheetModal()">⬆ Enviar Ficha</button>
    <button class="btn btn-danger sm" onclick="logout()">Sair</button>
  </div>
</div>

<div id="main">
  <!-- HUD -->
  <div id="hud">
    <div class="hud-sec">Party</div>
    <div id="hud-chars"></div>
    <div id="online-list">
      <div class="hud-sec" style="padding:0 0 4px">Online</div>
      <div id="online-users"></div>
    </div>
  </div>

  <!-- NARRATIVE -->
  <div id="narrative">
    <div id="log">
      <div class="msg msg-system">[ Conectando à sessão... ]</div>
    </div>
    <div id="input-area">
      <div class="dice-row">
        <span class="dice-label">🎲 ROLAR:</span>
        <div id="attr-btns"></div>
        <button class="free-roll-btn" onclick="rollFree()">2d6 livre</button>
      </div>
      <div class="input-row">
        <span style="font-family:var(--font-m);color:var(--accent);font-size:.9rem;flex-shrink:0">&gt;</span>
        <textarea id="action-input" placeholder="Descreva sua ação..." rows="1"></textarea>
        <button class="btn btn-accent" onclick="sendAction()" style="flex-shrink:0">AGIR</button>
      </div>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chat-sidebar">
    <div id="chat-header">💬 Chat da Party</div>
    <div id="chat-log"></div>
    <div id="chat-input-row">
      <input id="chat-inp" type="text" placeholder="Mensagem..."/>
      <button id="chat-send" onclick="sendChat()">▶</button>
    </div>
  </div>
</div>

<!-- INTRO POPUP (aparece ao entrar na sessão) -->
<div id="intro-popup" onclick="if(event.target===this)this.style.display='none'"
  style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:600;align-items:center;justify-content:center">
  <div style="background:var(--panel);border:1px solid var(--accent);width:480px;max-width:92vw;max-height:80vh;overflow-y:auto;padding:28px;position:relative">
    <div style="font-family:var(--font-d);font-size:.6rem;letter-spacing:3px;color:var(--accent);margin-bottom:16px;text-transform:uppercase">⚡ Bem-vindo à Aventura</div>
    <div id="intro-popup-body" style="font-size:.86rem;line-height:1.75;color:var(--text)"></div>
    <button onclick="document.getElementById('intro-popup').style.display='none'"
      class="btn btn-accent full" style="margin-top:20px">▶ Entrar na Sessão</button>
  </div>
</div>

<!-- SHEET UPLOAD MODAL -->
<div class="modal-overlay" id="sheet-modal">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div class="modal-title">📄 Minha Ficha</div>
      <button class="modal-close" onclick="closeModal('sheet-modal')">✕</button>
    </div>
    <p style="font-size:.75rem;color:var(--muted);line-height:1.6">
      Carregue o arquivo JSON salvo na ficha de personagem. Os dados serão sincronizados com todos os jogadores.
    </p>
    <div id="sheet-status" style="font-family:var(--font-m);font-size:.7rem;color:var(--muted)">Nenhuma ficha carregada.</div>
    <button class="btn btn-accent full" onclick="document.getElementById('sheet-file').click()">📂 Carregar JSON da Ficha</button>
    <input type="file" id="sheet-file" accept=".json" style="display:none" onchange="uploadSheet(event)"/>
    <div id="sheet-preview" style="display:none">
      <div style="font-family:var(--font-d);font-size:.6rem;color:var(--accent);margin-bottom:6px">PRÉVIA</div>
      <div id="sheet-preview-content" style="font-family:var(--font-m);font-size:.65rem;color:var(--muted);line-height:1.8"></div>
      <button class="btn btn-accent full" onclick="confirmUploadSheet()">✓ Confirmar e Enviar</button>
    </div>
  </div>
</div>

<!-- SHEET POPUP (ficha completa) -->
<div id="sheet-popup" onclick="closeSheetPopup(event)" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:center;justify-content:center">
  <div id="sheet-popup-box" style="background:var(--panel);border:1px solid var(--border2);width:520px;max-height:88vh;overflow-y:auto;position:relative;display:grid;grid-template-columns:160px 1fr">
    <button onclick="closeSheetPopupForce()" style="position:absolute;top:10px;right:12px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;z-index:10">✕</button>
    <div id="sheet-popup-content" style="display:contents"></div>
  </div>
</div>

<div id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ── AUTH ──────────────────────────────────────────────────────────
const token = localStorage.getItem('hi_token');
const me = JSON.parse(localStorage.getItem('hi_user') || 'null');
if (!token || !me || me.role === 'master') { window.location.href = '/'; }
document.getElementById('user-label').textContent = me.displayName;

function logout() {
  localStorage.removeItem('hi_token'); localStorage.removeItem('hi_user');
  window.location.href = '/';
}

// ── SOCKET ───────────────────────────────────────────────────────
const socket = io({ auth: { token } });
let sheets = {}; // username -> sheet
let pendingSheet = null;

socket.on('connect', () => appendSystem('[ Conectado à sessão ]'));
socket.on('disconnect', () => appendSystem('[ Desconectado ]'));
socket.on('connect_error', e => appendSystem(`[ Erro: ${e.message} ]`));

socket.on('history_load', msgs => {
  document.getElementById('log').innerHTML = '';
  msgs.forEach(renderMessage);
  scrollLog();
});

socket.on('sheets_load', list => {
  list.forEach(s => { sheets[s.username] = s; });
  renderHUD();
  buildAttrBtns();
});

socket.on('sheet_updated', ({ username, sheet }) => {
  sheets[username] = sheet;
  renderHUD();
  if (username === me.username) buildAttrBtns();
});

socket.on('sheet_removed', ({ username }) => {
  delete sheets[username];
  renderHUD();
});

socket.on('message', msg => {
  if (msg.type === 'chat') { renderChat(msg); return; }
  renderMessage(msg);
  scrollLog();
});

socket.on('users_online', list => renderOnline(list));

socket.on('show_intro', ({ text }) => {
  document.getElementById('intro-popup-body').innerHTML = mdToHtml(text);
  document.getElementById('intro-popup').style.display = 'flex';
});

// ── SHARED SHEET BUILDER ─────────────────────────────────────────
const CLS_EMOJI = {'Guerreiro':'⚔️','Cavaleiro':'🛡️','Mago':'✨','Clérigo':'✝️','Caçador':'🏹','Ladino':'🗡️'};

function calcDerived(s){
  const atq=parseInt(s.atq)||0, res=parseInt(s.res)||0, sab=parseInt(s.sab)||0, agi=parseInt(s.agi)||0;
  return { ini:2+agi, jAtq:atq, def:4+res, rmag:4+sab, vit:10+Math.floor(res/2), vontade:10+Math.floor(sab/2) };
}

function buildSheetPopupHTML(s){
  const d = calcDerived(s);
  const vit = s.vitCur ?? d.vit;
  const von = s.vonCur ?? d.vontade;
  const hpPct = Math.max(0,Math.round(vit/d.vit*100));
  const wpPct = Math.max(0,Math.round(von/d.vontade*100));
  const powers = [s.power1,s.power2,s.power3].filter(Boolean);
  const avatarHTML = s.avatar
    ? `<img src="${s.avatar}" style="width:160px;height:160px;object-fit:cover;object-position:top;display:block"/>`
    : `<div style="width:160px;height:160px;display:flex;align-items:center;justify-content:center;font-size:3rem;background:var(--card)">${CLS_EMOJI[s.cls]||'❓'}</div>`;
  return `
    <div style="border-right:1px solid var(--border2);display:flex;flex-direction:column">
      <div style="border-bottom:1px solid var(--border2)">${avatarHTML}</div>
      <div style="padding:10px 12px;border-bottom:1px solid var(--border)">
        <div style="font-family:var(--font-d);font-size:.82rem;letter-spacing:2px;color:var(--accent);margin-bottom:2px">${s.name||s.username}</div>
        <div style="font-size:.63rem;color:var(--accent2);letter-spacing:1px;margin-bottom:2px">${CLS_EMOJI[s.cls]||''} ${s.cls||'?'}</div>
        <div style="font-size:.6rem;color:var(--muted)">${s.type||'?'} · ${s.sex==='M'?'Masculino':s.sex==='F'?'Feminino':'?'}</div>
        ${s.appearance?`<div style="font-size:.58rem;color:var(--muted);margin-top:4px;font-style:italic">${s.appearance}</div>`:''}
      </div>
      <div style="padding:10px 12px;display:flex;flex-direction:column;gap:6px">
        <div>
          <div style="display:flex;justify-content:space-between;font-family:var(--font-d);font-size:.5rem;color:var(--muted);margin-bottom:2px"><span>VIT</span><b style="color:var(--hp);font-weight:400">${vit}/${d.vit}</b></div>
          <div style="height:5px;background:var(--border)"><div style="height:100%;width:${hpPct}%;background:var(--hp)"></div></div>
        </div>
        <div>
          <div style="display:flex;justify-content:space-between;font-family:var(--font-d);font-size:.5rem;color:var(--muted);margin-bottom:2px"><span>VON</span><b style="color:var(--wp);font-weight:400">${von}/${d.vontade}</b></div>
          <div style="height:5px;background:var(--border)"><div style="height:100%;width:${wpPct}%;background:var(--wp)"></div></div>
        </div>
        <div style="font-family:var(--font-m);font-size:.58rem;color:var(--muted)">⭐ XP: <b style="color:var(--accent)">${s.xpTotal||0}</b></div>
      </div>
    </div>
    <div style="padding:14px 16px;display:flex;flex-direction:column;gap:12px;overflow-y:auto">
      <div>
        <div style="font-family:var(--font-d);font-size:.48rem;letter-spacing:2px;color:var(--muted);border-bottom:1px solid var(--border);padding-bottom:4px;margin-bottom:8px;text-transform:uppercase">Atributos</div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:5px">
          ${[['ATQ',s.atq,'rgba(255,95,126,.3)'],['RES',s.res,'rgba(58,255,200,.3)'],['SAB',s.sab,'rgba(200,123,255,.3)'],['AGI',s.agi,'rgba(107,95,255,.3)']].map(([n,v,c])=>`
          <div style="background:var(--card);border:1px solid ${c};padding:6px;text-align:center">
            <div style="font-size:.48rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase">${n}</div>
            <div style="font-family:var(--font-d);font-size:1.1rem;color:var(--accent)">${v||0}</div>
          </div>`).join('')}
        </div>
      </div>
      <div>
        <div style="font-family:var(--font-d);font-size:.48rem;letter-spacing:2px;color:var(--muted);border-bottom:1px solid var(--border);padding-bottom:4px;margin-bottom:8px;text-transform:uppercase">Ficha de Combate</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px">
          ${[['Iniciativa',d.ini],['J. de Ataque',d.jAtq],['Defesa',d.def],['Res. Mágica',d.rmag],['Equip. 1',s.eq1||'—'],['Equip. 2',s.eq2||'—']].map(([l,v])=>`
          <div style="background:var(--card);border:1px solid var(--border);padding:5px 8px">
            <div style="font-size:.45rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase">${l}</div>
            <div style="font-family:var(--font-d);font-size:.82rem;color:var(--text);margin-top:1px">${v}</div>
          </div>`).join('')}
        </div>
      </div>
      ${powers.length?`<div>
        <div style="font-family:var(--font-d);font-size:.48rem;letter-spacing:2px;color:var(--muted);border-bottom:1px solid var(--border);padding-bottom:4px;margin-bottom:8px;text-transform:uppercase">Poderes</div>
        ${powers.map(p=>`<div style="font-size:.7rem;color:var(--wp);margin-bottom:4px">◆ ${p}</div>`).join('')}
      </div>`:''}
      ${s.notes?`<div>
        <div style="font-family:var(--font-d);font-size:.48rem;letter-spacing:2px;color:var(--muted);border-bottom:1px solid var(--border);padding-bottom:4px;margin-bottom:8px;text-transform:uppercase">Anotações</div>
        <div style="font-size:.72rem;color:var(--muted);line-height:1.6;white-space:pre-wrap">${s.notes}</div>
      </div>`:''}
    </div>`;
}

function openSheetPopup(username){
  const s=sheets[username]; if(!s) return;
  document.getElementById('sheet-popup-content').innerHTML=buildSheetPopupHTML(s);
  document.getElementById('sheet-popup').classList.add('open');
}
function closeSheetPopup(e){ if(e.target===document.getElementById('sheet-popup')) closeSheetPopupForce(); }
function closeSheetPopupForce(){ document.getElementById('sheet-popup').classList.remove('open'); }

// ── HUD — compact ────────────────────────────────────────────────
function renderHUD() {
  const el = document.getElementById('hud-chars');
  el.innerHTML = '';
  Object.values(sheets).forEach(s => {
    const isMe = s.username === me.username;
    const d = calcDerived(s);
    const vit = s.vitCur ?? d.vit;
    const von = s.vonCur ?? d.vontade;
    const hpPct = Math.max(0,Math.round(vit/d.vit*100));
    const wpPct = Math.max(0,Math.round(von/d.vontade*100));

    const vitEdit = isMe
      ? `<div class="vit-edit">
          <span style="font-size:.5rem;color:var(--muted)">VIT</span>
          <input class="vit-inp" id="vit-inp" type="number" value="${vit}" min="0" max="${d.vit}"
            onclick="event.stopPropagation()" onchange="updateStat('vitCur',this.value)"/>
          <span class="vit-sep">/</span><span class="vit-max">${d.vit}</span>
          <span style="font-size:.5rem;color:var(--muted);margin-left:4px">VON</span>
          <input class="vit-inp von-inp" id="von-inp" type="number" value="${von}" min="0" max="${d.vontade}"
            onclick="event.stopPropagation()" onchange="updateStat('vonCur',this.value)"/>
          <span class="vit-sep">/</span><span class="vit-max">${d.vontade}</span>
         </div>`
      : `<div class="hud-bar">
          <div class="hud-bar-top"><span>VIT</span><b>${vit}/${d.vit}</b></div>
          <div class="hud-track"><div class="hud-fill hp" style="width:${hpPct}%"></div></div>
         </div>
         <div class="hud-bar">
          <div class="hud-bar-top"><span>VON</span><b>${von}/${d.vontade}</b></div>
          <div class="hud-track"><div class="hud-fill wp" style="width:${wpPct}%"></div></div>
         </div>`;

    const card = document.createElement('div');
    card.className = `hud-char ${isMe?'me':''}`;
    card.innerHTML = `
      <div class="hud-char-header">
        <span class="hud-char-emoji">${CLS_EMOJI[s.cls]||'❓'}</span>
        <span class="hud-char-name">${s.name||s.username}</span>
        ${isMe?'<span class="me-tag">EU</span>':''}
      </div>
      <div class="hud-char-sub">${s.cls||'?'} · ${s.type||'?'}</div>
      ${vitEdit}
      <div style="font-size:.5rem;color:var(--border2);text-align:right;margin-top:4px;font-family:var(--font-m)">ver ficha ▸</div>`;
    card.onclick = () => openSheetPopup(s.username);
    el.appendChild(card);
  });
}

function updateStat(field, value) {
  socket.emit('update_stats', { username: me.username, stats: { [field]: parseInt(value)||0 } });
}

// ── ATTR BUTTONS ─────────────────────────────────────────────────
function buildAttrBtns() {
  const el = document.getElementById('attr-btns');
  el.innerHTML = '';
  const s = sheets[me.username];
  if (!s) return;
  [['ATQ', s.atq], ['RES', s.res], ['SAB', s.sab], ['AGI', s.agi]].forEach(([name, val]) => {
    if (!val) return;
    const btn = document.createElement('button');
    btn.className = 'attr-roll-btn';
    btn.textContent = `${name} (${val})`;
    btn.onclick = () => rollAttr(name, parseInt(val)||0);
    el.appendChild(btn);
  });
}

// ── DICE ─────────────────────────────────────────────────────────
function rollAttr(attrName, attr) {
  socket.emit('roll', { attr, attrName });
}
function rollFree() {
  socket.emit('roll', { attr: 0, attrName: 'Livre' });
}

// ── ACTIONS ──────────────────────────────────────────────────────
function sendAction() {
  const inp = document.getElementById('action-input');
  const content = inp.value.trim();
  if (!content) return;
  inp.value = ''; autoResize(inp);
  socket.emit('action', { content });
}

function sendChat() {
  const inp = document.getElementById('chat-inp');
  const content = inp.value.trim();
  if (!content) return;
  inp.value = '';
  socket.emit('chat', { content });
}

// ── MARKDOWN ─────────────────────────────────────────────────────
function inlineMd(t){
  return t
    .replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/__(.+?)__/g,'<strong>$1</strong>')
    .replace(/_(.+?)_/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code style="font-family:var(--font-m);color:var(--accent2);font-size:.85em;background:rgba(107,95,255,.1);padding:1px 4px">$1</code>');
}

function mdToHtml(text){
  const lines = text.split('\n');
  let html = '', inList = false;
  for(let raw of lines){
    if(inList && !raw.match(/^[\*\-] /)){ html += '</ul>'; inList = false; }
    if(!raw.trim()) continue;
    if(raw.startsWith('### ')){ html += `<h3 style="font-family:var(--font-d);font-size:.72rem;color:var(--accent2);letter-spacing:1px;margin:8px 0 4px">${inlineMd(raw.slice(4))}</h3>`; continue; }
    if(raw.startsWith('## ')) { html += `<h2 style="font-family:var(--font-d);font-size:.82rem;color:var(--accent);letter-spacing:1px;margin:8px 0 4px">${inlineMd(raw.slice(3))}</h2>`; continue; }
    if(raw.startsWith('# '))  { html += `<h1 style="font-family:var(--font-d);font-size:.95rem;color:var(--accent);letter-spacing:2px;margin:8px 0 4px">${inlineMd(raw.slice(2))}</h1>`; continue; }
    if(raw.match(/^[-*]{3,}$/)){ html += '<hr style="border:none;border-top:1px solid var(--border2);margin:8px 0">'; continue; }
    if(raw.match(/^[\*\-] /)){ if(!inList){html+='<ul style="padding-left:16px;margin-bottom:6px">';inList=true;} html+=`<li>${inlineMd(raw.slice(2))}</li>`; continue; }
    html += `<p style="margin-bottom:5px">${inlineMd(raw)}</p>`;
  }
  if(inList) html += '</ul>';
  return html;
}

// ── RENDER MESSAGES ───────────────────────────────────────────────
function renderMessage(msg) {
  const log = document.getElementById('log');
  const el = document.createElement('div');

  if (msg.type === 'narrate') {
    el.className = 'msg msg-narrate';
    el.innerHTML = mdToHtml(msg.content);
  } else if (msg.type === 'action') {
    el.className = 'msg msg-action';
    el.innerHTML = `<div class="act-author">${msg.author}:</div>${inlineMd(msg.content)}`;
  } else if (msg.type === 'roll') {
    const cls = msg.isCritical ? 'critical' : msg.isFumble ? 'fumble' : '';
    el.className = `msg msg-roll ${cls}`;
    const tag = msg.isCritical ? '<span class="roll-tag">🌟 ACERTO DECISIVO</span>'
                : msg.isFumble  ? '<span class="roll-tag">💀 FALHA CRÍTICA</span>' : '';
    const attrLabel = msg.attrName && msg.attr ? `+ ${msg.attr} (${msg.attrName})` : msg.attr ? `+ ${msg.attr}` : '';
    el.innerHTML = `
      <div class="roll-author">${msg.author} rolou ${msg.attrName||'2d6'}</div>
      <span class="roll-dice">[${msg.d1}] + [${msg.d2}]</span> ${attrLabel} = <span class="roll-total">${msg.total}</span>${tag}`;
  } else if (msg.type === 'system') {
    el.className = 'msg msg-system';
    el.textContent = msg.content;
  }

  if (el.innerHTML || el.textContent) {
    log.appendChild(el);
    scrollLog();
  }
}

function renderChat(msg) {
  const log = document.getElementById('chat-log');
  const el = document.createElement('div');
  el.className = 'chat-msg';
  const isMaster = msg.role === 'master';
  el.innerHTML = `<div class="chat-author ${isMaster?'master':''}">${msg.author}${isMaster?' (Mestre)':''}</div><div class="chat-text">${inlineMd(msg.content)}</div>`;
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
}

function renderOnline(list) {
  const el = document.getElementById('online-users');
  el.innerHTML = list.map(u => `
    <div class="online-user ${u.role==='master'?'master':''}">
      <div class="dot"></div>${u.displayName}${u.role==='master'?' ✦':''}
    </div>`).join('');
}

function appendSystem(text) {
  const log = document.getElementById('log');
  const el = document.createElement('div');
  el.className = 'msg msg-system';
  el.textContent = text;
  log.appendChild(el);
  scrollLog();
}

function scrollLog() {
  const log = document.getElementById('log');
  log.scrollTop = log.scrollHeight;
}

// ── SHEET UPLOAD ──────────────────────────────────────────────────
function openSheetModal() {
  document.getElementById('sheet-modal').classList.add('open');
  const s = sheets[me.username];
  if (s) document.getElementById('sheet-status').textContent = `Ficha atual: ${s.name||me.username} · ${s.cls||'?'} · ${s.type||'?'}`;
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function uploadSheet(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      pendingSheet = JSON.parse(ev.target.result);
      document.getElementById('sheet-preview').style.display = '';
      document.getElementById('sheet-preview-content').innerHTML = `
        Nome: <b style="color:var(--accent)">${pendingSheet.name||'?'}</b><br>
        Classe: ${pendingSheet.cls||'?'} · Tipo: ${pendingSheet.type||'?'}<br>
        ATQ:${pendingSheet.atq||0} RES:${pendingSheet.res||0} SAB:${pendingSheet.sab||0} AGI:${pendingSheet.agi||0}<br>
        VIT: ${pendingSheet.vit||'?'} · VON: ${pendingSheet.vontade||'?'}`;
    } catch { toast('Arquivo inválido'); }
  };
  reader.readAsText(file);
}

async function confirmUploadSheet() {
  if (!pendingSheet) return;
  try {
    const res = await fetch('/api/sheets', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify(pendingSheet)
    });
    if (!res.ok) throw new Error();
    toast('✅ Ficha enviada!');
    closeModal('sheet-modal');
    pendingSheet = null;
    document.getElementById('sheet-preview').style.display = 'none';
  } catch { toast('Erro ao enviar ficha'); }
}

// ── AUTO RESIZE ───────────────────────────────────────────────────
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// ── EVENTS ────────────────────────────────────────────────────────
document.getElementById('action-input').addEventListener('input', function(){ autoResize(this); });
document.getElementById('action-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendAction(); }
});
document.getElementById('chat-inp').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendChat();
});

// ── TOAST ─────────────────────────────────────────────────────────
function toast(msg, dur=2500) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}
</script>
